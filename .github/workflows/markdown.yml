name: Docs to PDF

on:
  push:
    branches: [ "main" ]
    paths:
      - 'README.md'
      - 'images/**'

jobs:
  converttopdf:
    name: Build PDF + HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Convert markdown
        uses: BaileyJM02/markdown-to-pdf@v1.2.0
        with:
          input_path: ./README.md
          output_dir: ./dist
          images_dir: ./images
          image_import: ./images
          build_html: true
          build_pdf: true

      - uses: actions/upload-artifact@v3
        with:
          name: docs-build
          path: ./dist
